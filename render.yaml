# render.yaml — Mychat v9 Blueprint
services:
  - type: web
    name: mychat-v9-backend
    runtime: node
    buildCommand: "cd backend && npm install"
    startCommand: "node backend/src/server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: mychat-v9-db
          property: connectionString
      - key: DB_SSL
        value: "true"
      - key: ADMIN_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://mychat-v9.web.app # Update this after Firebase deploy

databases:
  - name: mychat-v9-db
    plan: free # Change to starter/standard for production
    databaseName: mychat_v9
    user: mychat_admin
