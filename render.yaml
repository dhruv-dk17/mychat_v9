# render.yaml — Mychat v9 Blueprint (Card-Free Version)
# This blueprint only provisions the Web Service. 
# Databases often require card verification on Render; use an external one (Supabase/Neon) for 100% free hosting.

services:
  - type: web
    name: mychat-v9-backend
    runtime: node
    plan: free # Ensures the Free Tier is used
    buildCommand: "cd backend && npm install"
    startCommand: "node backend/src/server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false # User will paste their Supabase/Neon URL here
      - key: DB_SSL
        value: "true"
      - key: ADMIN_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://mychat-v9.web.app
